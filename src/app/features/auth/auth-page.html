<div class="screen-auth" role="main">
  <div class="auth-mark">
    <div class="auth-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        <path d="M8 7h8M8 11h6" />
      </svg>
    </div>
    <div class="auth-title">{{ i18n.t('brand') }}</div>
    <div class="auth-sub">{{ i18n.t('tagline') }}</div>
  </div>

  <div class="auth-actions">
    <div class="auth-error" role="alert">{{ error() }}</div>
    <button
      type="button"
      class="btn-google"
      (click)="google()"
      [disabled]="busy()"
    >
      <svg class="g-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="#4285F4"
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
        />
        <path
          fill="#34A853"
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
        />
        <path
          fill="#FBBC05"
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
        />
        <path
          fill="#EA4335"
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
        />
      </svg>
      <span>{{ i18n.t('googleSignIn') }}</span>
    </button>

    <form class="auth-form" (submit)="$event.preventDefault(); submit()">
      @if (showEmail()) {
        @if (signUp()) {
          <div class="auth-field">
            <div class="auth-label">{{ i18n.t('name') }}</div>
            <input
              class="auth-input"
              type="text"
              autocomplete="name"
              [value]="name()"
              (input)="name.set(inputVal($event))"
            />
          </div>
        }
        <div class="auth-field">
          <div class="auth-label">{{ i18n.t('email') }}</div>
          <input
            class="auth-input"
            type="email"
            inputmode="email"
            autocomplete="email"
            [value]="email()"
            (input)="email.set(inputVal($event))"
          />
        </div>
        <div class="auth-field">
          <div class="auth-label">{{ i18n.t('password') }}</div>
          <input
            class="auth-input"
            type="password"
            autocomplete="current-password"
            [value]="password()"
            (input)="password.set(inputVal($event))"
          />
        </div>
        <button class="btn-fill" type="submit" [disabled]="busy()">
          {{ signUp() ? i18n.t('createAccount') : i18n.t('signIn') }}
        </button>
        <div class="auth-toggle">
          @if (signUp()) {
            <button type="button" class="linkish" (click)="toggleMode()">
              {{ i18n.t('signIn') }}
            </button>
          } @else {
            <button type="button" class="linkish" (click)="toggleMode()">
              {{ i18n.t('createAccount') }}
            </button>
          }
        </div>
      }
    </form>

    @if (!showEmail()) {
      <button type="button" class="btn-text" (click)="showEmail.set(true)">
        {{ i18n.t('emailInstead') }}
      </button>
    }

    <div class="auth-divider">{{ i18n.t('or') }}</div>
    <button
      type="button"
      class="btn-outline"
      (click)="guest()"
      [disabled]="busy()"
    >
      {{ i18n.t('guest') }}
    </button>
  </div>
</div>
