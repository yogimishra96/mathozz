@if (!auth.initialized()) {
  <div class="boot-screen" role="status" aria-live="polite">
    <div class="load-mark">
      <div class="load-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          <path d="M8 7h8M8 11h6" />
        </svg>
      </div>
      <span class="load-wordmark">Mathozz</span>
    </div>
    <div class="load-bar-track">
      <div class="load-bar-fill indeterminate"></div>
    </div>
  </div>
} @else {
  <div
    class="flash"
    [class.pop]="flashOn()"
    [class.g]="flashKind() === 'success'"
    [class.r]="flashKind() === 'error'"
    aria-hidden="true"
  ></div>
  <div
    class="toast"
    [class.show]="ui.toastVisible()"
    role="status"
    aria-live="polite"
  >
    {{ ui.toastMessage() }}
  </div>
  <router-outlet />
}
